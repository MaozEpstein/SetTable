name: EAS Update (OTA)

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      message:
        description: 'Update message'
        required: false
        default: 'Manual OTA update'

jobs:
  update:
    name: Publish OTA update to production branch
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Publish update
        run: |
          MSG="${{ github.event.inputs.message }}"
          if [ -z "$MSG" ]; then
            MSG=$(git log -1 --pretty=%s)
          fi
          eas update --branch production --message "$MSG" --non-interactive

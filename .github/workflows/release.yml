name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release-apk:
    name: Build and publish APK
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Install dependencies
        run: npm ci

      - name: Expo prebuild (android)
        run: npx expo prebuild --platform android --no-install --non-interactive

      - name: Generate debug keystore
        run: |
          keytool -genkeypair -v \
            -keystore android/app/debug.keystore \
            -alias androiddebugkey \
            -storepass android -keypass android \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Configure release signing with debug keystore
        run: |
          python3 - <<'PY'
          from pathlib import Path
          p = Path("android/app/build.gradle")
          s = p.read_text()
          inject = """
              signingConfigs {
                  release {
                      storeFile file('debug.keystore')
                      storePassword 'android'
                      keyAlias 'androiddebugkey'
                      keyPassword 'android'
                  }
              }
          """
          if "signingConfigs {" not in s:
              s = s.replace("android {\n", "android {\n" + inject, 1)
          s = s.replace(
              "signingConfig signingConfigs.debug",
              "signingConfig signingConfigs.release",
          )
          p.write_text(s)
          PY

      - name: Build release APK
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon

      - name: Rename APK to stable filename
        run: cp android/app/build/outputs/apk/release/app-release.apk SetTable.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          name: ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          body: |
            ## 🕯️ שולחן ערוך — גרסה ${{ github.ref_name }}

            ### הורדה
            הורידו את ה-APK המצורף, או השתמשו בקישור הקבוע שתמיד מצביע על הגרסה האחרונה:

            https://github.com/MaozEpsein/SetTable/releases/latest/download/SetTable.apk

            ### התקנה
            פתחו את הקובץ במכשיר אנדרואיד ואשרו "התקנה ממקור לא מוכר" אם תתבקשו.
          files: SetTable.apk

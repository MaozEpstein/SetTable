<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <radialGradient id="plateShade" cx="50%" cy="48%" r="50%">
      <stop offset="80%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F1ECE0"/>
    </radialGradient>
  </defs>

  <!-- cream background (rounded square handled by OS / iOS adds the corner) -->
  <rect width="1024" height="1024" fill="#FBF7F0"/>

  <!-- plate shadow -->
  <circle cx="512" cy="528" r="380" fill="#1F2A44" opacity="0.10"/>

  <!-- plate body -->
  <circle cx="512" cy="512" r="380" fill="url(#plateShade)"/>

  <!-- sector 1: turquoise (meat / top-right) -->
  <path d="M 512 512
           L 512 192
           A 320 320 0 0 1 789.13 672
           Z"
        fill="#5B8E9A" opacity="0.92"/>

  <!-- sector 2: green-olive (salad / left-bottom) -->
  <path d="M 512 512
           L 234.87 672
           A 320 320 0 0 1 512 192
           Z"
        fill="#7A9D54" opacity="0.92"/>

  <!-- sector 3: gold (fish/carb / bottom) -->
  <path d="M 512 512
           L 789.13 672
           A 320 320 0 0 1 234.87 672
           Z"
        fill="#C9943B" opacity="0.92"/>

  <!-- white dividers -->
  <g stroke="#FFFFFF" stroke-width="14" stroke-linecap="round">
    <line x1="512" y1="512" x2="512" y2="192"/>
    <line x1="512" y1="512" x2="234.87" y2="672"/>
    <line x1="512" y1="512" x2="789.13" y2="672"/>
  </g>

  <!-- center white dot -->
  <circle cx="512" cy="512" r="22" fill="#FFFFFF"/>

  <!-- gold rim -->
  <circle cx="512" cy="512" r="380" fill="none" stroke="#C9943B" stroke-width="16"/>
  <circle cx="512" cy="512" r="330" fill="none" stroke="#C9943B" stroke-width="4" opacity="0.5"/>
</svg>

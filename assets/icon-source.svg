<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <!-- cream background -->
  <rect width="1024" height="1024" fill="#FBF7F0"/>

  <!-- soft shadow under the loaf -->
  <ellipse cx="512" cy="760" rx="340" ry="20" fill="#1F2A44" opacity="0.08"/>

  <!-- sesame seeds floating above the loaf -->
  <g fill="#1F2A44" opacity="0.85">
    <ellipse cx="320" cy="300" rx="8" ry="12" transform="rotate(-25 320 300)"/>
    <ellipse cx="410" cy="270" rx="8" ry="12" transform="rotate(15 410 270)"/>
    <ellipse cx="510" cy="258" rx="8" ry="12" transform="rotate(-10 510 258)"/>
    <ellipse cx="610" cy="270" rx="8" ry="12" transform="rotate(20 610 270)"/>
    <ellipse cx="700" cy="300" rx="8" ry="12" transform="rotate(-15 700 300)"/>
  </g>

  <!-- challah outline: rounded oblong loaf -->
  <path
    d="M 232 530
       Q 232 380, 392 380
       L 632 380
       Q 792 380, 792 530
       Q 792 680, 632 680
       L 392 680
       Q 232 680, 232 530 Z"
    fill="none"
    stroke="#C9943B"
    stroke-width="18"
    stroke-linejoin="round"/>

  <!-- braid: 3 flowing sine-wave strands interweaving -->
  <g fill="none" stroke="#C9943B" stroke-width="22" stroke-linecap="round">
    <!-- top strand: starts low, waves up-down-up-down -->
    <path d="M 280 510
             C 360 440, 440 580, 520 510
             S 680 440, 760 510"
          opacity="0.95"/>

    <!-- middle strand: phase-shifted, starts high -->
    <path d="M 280 540
             C 360 600, 440 460, 520 540
             S 680 600, 760 540"
          opacity="0.95"/>
  </g>

  <!-- braid "knots" — small accent ovals at each crossing point to imply weaving -->
  <g fill="#C9943B">
    <ellipse cx="360" cy="525" rx="10" ry="6" transform="rotate(20 360 525)"/>
    <ellipse cx="440" cy="525" rx="10" ry="6" transform="rotate(-20 440 525)"/>
    <ellipse cx="520" cy="525" rx="10" ry="6" transform="rotate(20 520 525)"/>
    <ellipse cx="600" cy="525" rx="10" ry="6" transform="rotate(-20 600 525)"/>
    <ellipse cx="680" cy="525" rx="10" ry="6" transform="rotate(20 680 525)"/>
  </g>

  <!-- end caps: little rounded bumps suggesting the loaf ends -->
  <circle cx="232" cy="530" r="14" fill="#C9943B"/>
  <circle cx="792" cy="530" r="14" fill="#C9943B"/>
</svg>
